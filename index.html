<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hey Frosé — Wine &amp; Charcuterie Bar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;background:#fff;color:#1a0a10;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit}
a{color:inherit;text-decoration:none}
img{max-width:100%;height:auto;display:block}

/* ── scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#fdf4f5}
::-webkit-scrollbar-thumb{background:#e8a8b2;border-radius:99px}

/* ── layout ── */
.wrap    {max-width:1200px;margin:0 auto;padding:0 48px}
.wrap-sm {max-width:800px; margin:0 auto;padding:0 48px}
.wrap-md {max-width:960px; margin:0 auto;padding:0 48px}

/* ── grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.ga2{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.gfoot{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px}

/* ── card ── */
.card{background:#fff;border-radius:28px;padding:32px;box-shadow:0 2px 24px rgba(210,120,135,.10)}
.card-pink{background:#fdf0f2;border-radius:28px;padding:32px}
.card-dark{background:#1a0a10;border-radius:28px;padding:32px}
.card-border{background:#fff;border-radius:28px;padding:32px;border:2px solid #f5d8de}

/* ── chip ── */
.chip{background:#fdf0f2;color:#c44f68;border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600;letter-spacing:.06em;white-space:nowrap;border:1.5px solid #f5d8de;flex-shrink:0}

/* ── buttons ── */
.btn-hot{display:inline-flex;align-items:center;justify-content:center;background:#d27887;color:#fff;border-radius:99px;padding:15px 32px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;font-family:inherit;transition:background .18s,transform .12s}
.btn-hot:hover{background:#b85f72;transform:translateY(-1px)}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;background:transparent;color:#1a0a10;border-radius:99px;padding:14px 30px;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:2px solid #f5d8de;font-family:inherit;transition:border-color .18s,background .18s}
.btn-ghost:hover{border-color:#d27887;background:#fdf0f2}
.btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:36px}
.btn-row-c{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:36px}

/* ── tabs / nav ── */
.nav-pill{border-radius:99px;padding:9px 18px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}

/* ── section spacing ── */
.s96{padding:96px 0}
.s72{padding:72px 0}
.s56{padding:56px 0}
.s48{padding:48px 0}
.pt0{padding-top:0}

/* ── eyebrow ── */
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.28em;color:#d27887;margin-bottom:0}

/* ── headings ── */
.h-display{font-family:"Playfair Display",Georgia,serif;font-weight:900;line-height:1.05;color:#1a0a10}
.h-serif  {font-family:"Playfair Display",Georgia,serif;line-height:1.2;color:#1a0a10}

/* ── badge strip ── */
.badge-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.badge-item{background:rgba(210,120,135,.13);border-radius:12px;padding:9px 14px;font-size:12px;font-weight:500;color:#7a3046;letter-spacing:.02em}

/* ── pink banner ── */
.pink-banner{background:linear-gradient(110deg,#b85f72 0%,#d27887 50%,#e8a8b2 100%);padding:72px 24px;text-align:center}

/* ── footer ── */
footer{background:#1a0a10;padding:72px 48px 40px}

/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim1{animation:fadeUp .6s ease both}
.anim2{animation:fadeUp .6s .1s ease both}
.anim3{animation:fadeUp .6s .2s ease both}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .gfoot{grid-template-columns:1fr 1fr;gap:28px}
  .g3{grid-template-columns:1fr 1fr;gap:16px}
}
@media(max-width:768px){
  .wrap,.wrap-sm,.wrap-md{padding:0 18px}
  footer{padding:52px 18px 32px}
  .g2,.g3,.ga,.ga2{grid-template-columns:1fr;gap:14px}
  .gfoot{grid-template-columns:1fr;gap:24px}
  .s96{padding:56px 0}
  .s72{padding:44px 0}
  .s56{padding:36px 0}
  .s48{padding:28px 0}
  .card,.card-pink,.card-dark,.card-border{padding:22px 18px;border-radius:22px}
  .btn-row,.btn-row-c{gap:10px}
}
@media(max-width:480px){
  .wrap,.wrap-sm,.wrap-md{padding:0 14px}
  footer{padding:44px 14px 28px}
}
</style>
</head>

/* ── atoms ── */
const Logo=({size=200,inv=false})=>(
  <img src={LOGO} alt="Hey Fros\u00e9" style={{width:"100%",maxWidth:size,height:"auto",display:"block",filter:inv?"brightness(0) invert(1)":undefined}}/>
);
const Ey=({s,color=C.pink})=><p className="eyebrow" style={{color}}>{s}</p>;
const BtnHot=({ch,onClick,href})=>{
  const st="btn-hot";
  return href?<a href={href} className={st}>{ch}</a>:<button className={st} onClick={onClick}>{ch}</button>;
};
const BtnGhost=({ch,onClick})=><button className="btn-ghost" onClick={onClick}>{ch}</button>;

const SecHead=({ey,title,sub,center=true})=>(
  <div style={{maxWidth:660,margin:center?"0 auto":"0",textAlign:center?"center":"left"}}>
    {ey&&<Ey s={ey}/>}
    <h2 className="h-display" style={{fontSize:"clamp(28px,3.5vw,48px)",marginTop:ey?10:0}}>{title}</h2>
    {sub&&<p style={{fontSize:15,lineHeight:1.8,color:C.muted,marginTop:14}}>{sub}</p>}
  </div>
);

const PageBanner=({ey,title,sub,children})=>(
  <section style={{background:C.tint,borderBottom:"2px solid "+C.border,padding:"72px 0 80px"}}>

);

            </div>
          </div>
        </section>
      </>

            </div>
          </div>

          <div className="wrap">

                <p style={{fontSize:14,lineHeight:1.8,color:C.muted,marginTop:10}}>Choose a curated mix of Classic Fros&eacute;, Peach Fros&eacute;, Strawberry Fros&eacute;, and seasonal pink pours &mdash; events that feel simple to order but still feel premium.</p>

            <div className="g2" style={{marginTop:20}}>

                <h3 className="h-serif" style={{fontSize:"clamp(18px,1.8vw,24px)",marginTop:10}}>Large Orders &amp; Business Gifting</h3>
                <ul style={{fontSize:14,lineHeight:1.9,color:C.muted,marginTop:12,paddingLeft:18}}>
                  {["Large-format catering orders","Office celebrations and client gifting","Multi-drop coordination","Custom charcuterie + frozen drink bundles","Premium event support for launches"].map(l=><li key={l}>{l}</li>)}

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* HEADER */}
      <header style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,0.95)",backdropFilter:"blur(20px)",borderBottom:"2px solid "+C.border}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"12px 48px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <button onClick={()=>go("home")} style={{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>

          <nav style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
            {nav.map(item=>{
